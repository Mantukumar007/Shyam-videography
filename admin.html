<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel — Shyam Videography and Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-body">
  <div class="page-bg"></div>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html">
        <span class="logo-mark">SVP</span>
        <span class="logo-text">Admin Panel</span>
      </a>
      <div class="admin-toolbar" id="adminNav">
        <button class="btn btn-outline" type="button" id="logoutBtn">Logout</button>
        <a class="btn btn-outline" href="index.html">Back to Website</a>
      </div>
    </div>
  </header>

  <main class="section admin-main">
    <div class="container">
      <div class="admin-login" id="adminLogin">
        <div class="section-title">
          <h2>Admin Login</h2>
          <p>Use your phone/email and password to access the dashboard.</p>
        </div>
        <form id="adminLoginForm">
          <label>
            <span>Phone or Email</span>
            <input type="text" name="loginId" placeholder="8507374062" required />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="••••••••" required />
          </label>
          <button class="btn btn-primary" type="submit">Login</button>
          <p class="form-success" id="loginError" aria-live="polite"></p>
        </form>
      </div>

      <div class="admin-dashboard" id="adminDashboard" hidden>
        <div class="section-title">
          <h2>Admin Dashboard</h2>
          <p>Manage enquiry dates and incoming requests.</p>
        </div>

        <div class="admin-panel">
          <div class="admin-grid">
            <div>
              <h3>Vivah Muhurat Calendar</h3>
              <div class="calendar-panel admin-calendar">
                <div class="calendar-header">
                  <button type="button" class="cal-nav" data-admin-cal-prev aria-label="Previous month">‹</button>
                  <div class="calendar-title" id="adminCalendarTitle"></div>
                  <button type="button" class="cal-nav" data-admin-cal-next aria-label="Next month">›</button>
                </div>
                <div class="calendar-weekdays" id="adminCalendarWeekdays"></div>
                <div class="calendar-grid" id="adminCalendarGrid"></div>
                <div class="calendar-legend">
                  <span class="legend shubh">Shubh Vivah Tithi</span>
                  <span class="legend normal">Normal Date</span>
                  <span class="legend enquired">Enquired</span>
                </div>
                <p class="calendar-note" id="adminCalendarNote"></p>
                <div class="calendar-detail" id="adminCalendarDetail"></div>
              </div>
            </div>

            <div>
              <h3>Manage Enquiries</h3>
              <div class="admin-list" id="enquiryList">
                <div class="admin-item">No enquiries yet.</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
